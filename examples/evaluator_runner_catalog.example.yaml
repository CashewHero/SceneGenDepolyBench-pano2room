catalog_version: 1

runners:
  - runner: my_evaluator
    version: 0.1.0
    latest: true
    display_name: My Evaluator
    kind: evaluator
    contract_version: 1
    inputs:
      required:
        - scene
      optional:
        - mesh
        - image
        - depth
        - camera_trajectory
    scheduling:
      max_batch_size: 50
      max_attempts: 3
      job_timeout_minutes: 30
      startup_timeout_minutes: 5
    launcher:
      driver: docker
      compat_version: 1
      image: my-evaluator:0.1.0
      endpoint:
        port: 58090
      # Optional runner-specific config examples:
      # env:
      #   EVAL_MODE: strict
      #   SCORE_THRESHOLD: "0.5"
      #   MODEL_WEIGHTS_DIR: /app/model_repo/weights
      #   HF_HOME: /app/model_repo/.cache/huggingface
