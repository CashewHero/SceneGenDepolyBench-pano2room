catalog_version: 1

runners:
  - runner: my_generator
    version: 0.1.0
    latest: true
    display_name: My Generator
    kind: generator
    contract_version: 1
    inputs:
      required:
        - image
      optional:
        - depth
        - camera_pose
    scheduling:
      max_batch_size: 50
      max_attempts: 3
      job_timeout_minutes: 60
      startup_timeout_minutes: 5
    launcher:
      driver: docker
      compat_version: 1
      image: my-generator:0.1.0
      endpoint:
        port: 58090
      # Optional runner-specific config examples:
      # env:
      #   MODEL_VARIANT: large
      #   SCORE_THRESHOLD: "0.5"
      #   MODEL_WEIGHTS_DIR: /app/model_repo/weights
      #   HF_HOME: /app/model_repo/.cache/huggingface
